<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zauri Editor</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="sidebar">
        <div id="sidebar-header">
          <span class="label">Explorer</span>
          <div id="sidebar-actions">
            <button class="sidebar-action-btn" id="open-folder-btn" title="Open Folder">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M1.5 2.5h4l1.5 1.5h7.5v9.5h-13z" stroke="currentColor" stroke-width="1.2" fill="none"/>
                <line x1="8" y1="7" x2="8" y2="11" stroke="currentColor" stroke-width="1.2"/>
                <line x1="6" y1="9" x2="10" y2="9" stroke="currentColor" stroke-width="1.2"/>
              </svg>
            </button>
            <button class="sidebar-action-btn" id="search-btn" title="Search (Cmd+Shift+F)">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="4" stroke="currentColor" stroke-width="1.2"/>
                <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="sidebar-action-btn" id="terminal-btn" title="Terminal (Cmd+`)">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="2" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
                <path d="M4 7l2.5 2L4 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="8" y1="11" x2="12" y2="11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="sidebar-action-btn" id="settings-btn" title="Settings (Cmd+,)">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
                <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="sidebar-action-btn" id="ai-btn" title="AI Assistant (Cmd+L)">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M8 1.5L2 5v6l6 3.5L14 11V5z" stroke="currentColor" stroke-width="1.2" fill="none"/>
                <circle cx="8" cy="8" r="2" fill="currentColor" opacity="0.6"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="projects-section">
          <div id="projects-header">
            <span class="label">Projects</span>
            <button class="sidebar-action-btn" id="new-project-btn" title="Add Project">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                <line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div id="projects-list"></div>
        </div>
        <div id="file-tree-section">
          <div id="file-tree-header">
            <span class="label">Files</span>
          </div>
          <div id="file-tree"></div>
        </div>
        <div id="sidebar-resize"></div>
      </div>
      <div id="main">
        <div id="tab-bar"></div>
        <div id="editor-container">
          <div id="welcome" class="fade-in">
            <h1>Zauri</h1>
            <p class="subtitle">Pick a Workspace Item or Start Something New</p>
            <div class="actions">
              <button class="action-btn" id="welcome-open-folder">Open Folder</button>
            </div>
            <div class="shortcuts">
              <div class="shortcut"><kbd>Cmd+O</kbd> <span>Open Folder</span></div>
              <div class="shortcut"><kbd>Cmd+S</kbd> <span>Save File</span></div>
              <div class="shortcut"><kbd>Cmd+Shift+F</kbd> <span>Search in Files</span></div>
              <div class="shortcut"><kbd>Cmd+L</kbd> <span>AI Assistant</span></div>
              <div class="shortcut"><kbd>Cmd+`</kbd> <span>Terminal</span></div>
            </div>
          </div>
        </div>
        <div id="search-panel" class="hidden">
          <div id="search-header">
            <span class="search-label">Search</span>
            <input id="search-input" type="text" placeholder="Search in files..." />
            <button id="search-close">&times;</button>
          </div>
          <div id="search-results"></div>
        </div>
        <div id="status-bar">
          <div id="status-left">
            <span id="status-git-branch" class="status-git-item" title="Click to switch branch"></span>
            <span id="status-git-changes" class="status-git-item"></span>
            <span id="status-git-sync" class="status-git-item"></span>
            <span id="status-file">No file open</span>
          </div>
          <div id="status-right">
            <span id="status-revert" style="display:none" title="Revert last AI edit">Revert</span>
            <span id="status-perf"></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
